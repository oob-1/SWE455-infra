name: terraform
on:
  push:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/terraform.yml"]
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION:        1.7.5
  TF_BACKEND_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_BACKEND_PREFIX: expense-tracker

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account:            ${{ vars.DEPLOYER_SA_EMAIL }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="prefix=${TF_BACKEND_PREFIX}"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate
        run: terraform validate

      - name: Plan
        run: |
          terraform plan \
            -var "project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var "github_owner=${{ vars.GITHUB_OWNER }}" \
            -out=tfplan

      - name: Apply (main only)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: terraform apply -auto-approve tfplan
