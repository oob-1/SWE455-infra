name: expense-tracker

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       expense_tracker
      POSTGRES_USER:     app
      POSTGRES_PASSWORD: app
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d expense_tracker"]
      interval: 5s
      retries: 10

  user-manager:
    build: ../expense-tracker-user-manager
    env_file: ../expense-tracker-user-manager/.env.example
    environment:
      DB_HOST: postgres
      JWT_SECRET: dev-only-shared-secret
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8081:8080"]

  expense-service:
    build: ../expense-tracker-expense-service
    env_file: ../expense-tracker-expense-service/.env.example
    environment:
      DB_HOST: postgres
      JWT_SECRET: dev-only-shared-secret
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8082:8080"]

volumes:
  pgdata:
